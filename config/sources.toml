# Curated article feeds
#
# Policy:
# - Prefer publisher-provided RSS/Atom endpoints.
# - Broad Rust feeds use conservative Rust-web relevance terms.
# - Avoid generic keywords such as "rust" that would accept every post.
# - excluded_any is applied before required_any.

[[feeds]]
id = "rust-main-blog"
name = "Rust Blog"
url = "https://blog.rust-lang.org/feed.xml"
category = "articles"
required_any = [
  "async",
  "await",
  "tokio",
  "axum",
  "tower",
  "hyper",
  "reqwest",
  "tonic",
  "grpc",
  "http",
  "websocket",
  "webassembly",
  "wasm",
  "network",
  "server",
  "tls",
  "rustls",
  "runtime",
  "database",
]
excluded_any = [
  "survey",
  "governance",
  "foundation",
  "outreachy",
  "summer of code",
  "trademark",
  "leadership council",
]

[[feeds]]
id = "inside-rust"
