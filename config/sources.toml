[collection]
github_api_url = "https://api.github.com"
github_max_pages = 10
request_timeout_seconds = 30

[security]
enabled = true
osv_api_url = "https://api.osv.dev"

[crates_io]
enabled = true
api_url = "https://crates.io/api/v1"
web_url = "https://crates.io/crates"
user_agent_env = "CRATES_IO_USER_AGENT"
request_delay_ms = 1100

[reconciliation]
article_window_days = 14
comment_on_story_update = true

[newsletter]
title_prefix = "Rust Web Monthly"
intro = "A monthly briefing on Rust web development: frameworks, async runtimes, networking, databases, security, and full-stack tooling."
output_dir = "content/issues"
manifest_dir = "data/newsletters"
release_tag_prefix = "digest"
release_name_prefix = "Rust Web Digest"
release_asset_name_prefix = "rust-web-digest"
commit_message_prefix = "publish digest"
sync_release_tag = true
category_order = [
  "frameworks",
  "runtime",
  "networking",
  "databases",
  "security",
  "fullstack",
  "articles",
  "tooling",
  "uncategorized",
]


[ai]
provider = "openai"
api_url = "https://api.openai.com/v1/responses"
api_key_env = "OPENAI_API_KEY"
model_env = "OPENAI_MODEL"
cache_dir = "data/ai-drafts"
request_timeout_seconds = 120
max_retries = 5
initial_backoff_ms = 1000
max_source_chars = 16000

[publishing]
candidate_label = "candidate"
new_status_label = "status:new"
additional_status_labels = []
watch_status_label = "status:watch"
selected_status_label = "status:selected"
rejected_status_label = "status:rejected"
published_status_label = "status:published"
skipped_status_label = "status:skipped"
late_discovery_label = "late-discovery"
monthly_parent_label = "editorial:month"
monthly_parent_title_prefix = "Rust Web Monthly"
ensure_labels = true
ensure_milestones = true
github_max_pages = 10

